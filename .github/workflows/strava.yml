name: Strava Export

permissions:
  contents: write
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --upgrade pip
      - run: pip install requests icalendar pandas

      - run: |
          python export_strava_activities.py
          python strengthlog-to-json.py
          python json-to-html.py
          python json-to-ics.py

      # commit updated files back to repo
      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add activities.json *.ics *.html
          git commit -m "Automated export" || echo "No changes"
          git push
