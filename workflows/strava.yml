name: Strava Export

on:
  schedule:
    - cron: "0 4 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests icalendar

      - name: Run scripts
        run: |
          python export_strava_activities.py
          python json-to-html.py
          python json-to-ics.py
